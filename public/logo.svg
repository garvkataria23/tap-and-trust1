<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#f5f5f5" rx="60"/>
  
  <!-- Top-left QR code -->
  <rect x="40" y="40" width="100" height="100" fill="none" stroke="#9d4edd" stroke-width="8"/>
  <rect x="60" y="60" width="60" height="60" fill="#9d4edd"/>
  
  <!-- Top-right QR code -->
  <rect x="372" y="40" width="100" height="100" fill="none" stroke="#9d4edd" stroke-width="8"/>
  <rect x="392" y="60" width="60" height="60" fill="#9d4edd"/>
  
  <!-- Bottom-left QR code -->
  <rect x="40" y="372" width="100" height="100" fill="none" stroke="#9d4edd" stroke-width="8"/>
  <rect x="60" y="392" width="60" height="60" fill="#9d4edd"/>
  
  <!-- Center QR pattern dots -->
  <g fill="#9d4edd">
    <!-- Row 1 -->
    <rect x="200" y="180" width="32" height="32"/>
    <rect x="264" y="180" width="32" height="32"/>
    
    <!-- Row 2 -->
    <rect x="168" y="212" width="32" height="32"/>
    <rect x="232" y="212" width="32" height="32"/>
    <rect x="296" y="212" width="32" height="32"/>
    
    <!-- Row 3 -->
    <rect x="200" y="244" width="32" height="32"/>
    <rect x="264" y="244" width="32" height="32"/>
    
    <!-- Row 4 -->
    <rect x="168" y="276" width="32" height="32"/>
    <rect x="232" y="276" width="32" height="32"/>
    <rect x="296" y="276" width="32" height="32"/>
    
    <!-- Row 5 -->
    <rect x="200" y="308" width="32" height="32"/>
    <rect x="264" y="308" width="32" height="32"/>
  </g>
  
  <!-- Connecting lines -->
  <line x1="140" y1="90" x2="372" y2="90" stroke="#9d4edd" stroke-width="6" stroke-dasharray="20,20" opacity="0.5"/>
  <line x1="90" y1="140" x2="90" y2="372" stroke="#9d4edd" stroke-width="6" stroke-dasharray="20,20" opacity="0.5"/>
  <line x1="422" y1="140" x2="422" y2="372" stroke="#9d4edd" stroke-width="6" stroke-dasharray="20,20" opacity="0.5"/>
  <line x1="140" y1="422" x2="372" y2="422" stroke="#9d4edd" stroke-width="6" stroke-dasharray="20,20" opacity="0.5"/>
</svg>
